<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Details</title>
<link rel="stylesheet" href="doctors.css">
</head>

<body data-flow-nav="back" data-flow-target="doctors.html" data-flow-label="Back to Doctors" data-flow-container="body">

<header class="primary-header patient-header">
  <div class="logo">
    <span>HealthPilot</span>
  </div>
  <div class="header-toolbar">
    <button class="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="patientNavLinks">Menu</button>
    <nav class="primary-nav patient-nav-bar" id="patientNavLinks">
      <a href="patient-dashboard.html#dashboard">Dashboard</a>
      <a href="doctors.html" class="active">Find Doctors</a>
      <a href="labs.html">Find Labs</a>
      <a href="patient-payments.html">Payments</a>
    </nav>
    <div class="header-actions">
      <div class="user-avatar-dropdown" id="userAvatarDropdown">
        <button
          type="button"
          class="avatar-btn"
          id="userAvatarBtn"
          aria-label="Open user menu"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span id="userInitial">P</span>
        </button>
        <div class="user-menu" id="userMenu" role="menu" aria-label="Patient actions">
          <button type="button" class="user-menu-btn" data-action="edit-profile">Edit Profile</button>
          <button type="button" class="user-menu-btn" data-action="logout">Logout</button>
        </div>
      </div>
    </div>
  </div>
</header>

<h2 class="details-heading">Doctor Profile</h2>

<div id="doctorContainer" class="doctor-card"></div>

<h3 class="details-heading">Patient Reviews</h3>

<div id="reviewsContainer"></div>

<h4 class="details-heading">Leave a Review</h4>

<form id="reviewForm">

<label>Rating</label>
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<br><br>

<textarea id="comment" placeholder="Write your review"></textarea>

<br><br>

<button type="submit">Submit Review</button>

</form>

<script type="module" src="authCheck.js"></script>
<script type="module" src="mobile-nav.js?v=20260306a"></script>
<script type="module" src="patient-header.js?v=20260326a"></script>
<script type="module" src="patient-notifications.js?v=20260327b"></script>
<script type="module" src="doctor-details.js?v=20260316a"></script>
<script type="module" src="back-button.js"></script>
<script type="module" src="site-footer.js?v=20260327b"></script>

</body>
</html>
