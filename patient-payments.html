<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment History - HealthPilot</title>
  <link rel="stylesheet" href="doctors.css?v=20260326f">
</head>
<body>

<header class="primary-header patient-header">
  <div class="logo">
    <span>HealthPilot</span>
  </div>
  <div class="header-toolbar">
    <button class="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="patientNavLinks">Menu</button>
    <nav class="primary-nav patient-nav-bar" id="patientNavLinks">
      <a href="patient-dashboard.html#dashboard">Dashboard</a>
      <a href="doctors.html">Find Doctors</a>
      <a href="labs.html">Find Labs</a>
      <a href="patient-payments.html" class="active">Payments</a>
    </nav>
    <div class="header-actions">
      <div class="user-avatar-dropdown" id="userAvatarDropdown">
        <button
          type="button"
          class="avatar-btn"
          id="userAvatarBtn"
          aria-label="Open user menu"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span id="userInitial">P</span>
        </button>
        <div class="user-menu" id="userMenu" role="menu" aria-label="Patient actions">
          <button type="button" class="user-menu-btn" data-action="edit-profile">Edit Profile</button>
          <button type="button" class="user-menu-btn" data-action="logout">Logout</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="main-container">
  <section class="dashboard-hero-card featured-hero">
    <div class="welcome-info">
      <p class="section-kicker">Payment History</p>
    </div>
    <div class="dashboard-stats">
      <div class="stat-card">
        <p class="stat-label">Transactions</p>
        <p class="stat-value" id="paymentCount">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Total Paid</p>
        <p class="stat-value" id="paymentTotal">Rs. 0</p>
      </div>
    </div>
  </section>

  <section class="appointments-section">
    <div class="section-head">
      <h2>Payments</h2>
      <div class="tabs">
        <button class="tab-btn active" type="button" data-filter="successful">Successful</button>
        <button class="tab-btn" type="button" data-filter="failed">Failed</button>
      </div>
    </div>
    <div id="paymentsContainer"></div>
  </section>
</main>

<script type="module" src="mobile-nav.js?v=20260306a"></script>
<script type="module" src="patient-header.js?v=20260326a"></script>
<script type="module" src="patient-notifications.js?v=20260327b"></script>
<script type="module" src="patient-payments.js?v=20260327c"></script>
<script type="module" src="site-footer.js?v=20260327b"></script>
</body>
</html>
