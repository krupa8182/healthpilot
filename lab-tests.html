<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Tests - HealthPilot</title>
  <link rel="stylesheet" href="doctors.css?v=20260327g">
</head>
<body>

<header class="primary-header lab-header">
  <div class="logo">
    <span>HealthPilot</span>
    <p class="subtext">Lab Panel</p>
  </div>
  <div class="header-toolbar">
    <nav class="primary-nav doctor-header-nav" aria-label="Lab navigation">
      <a href="lab-dashboard.html">Dashboard</a>
      <a href="lab-working-hours.html">Edit Hours</a>
      <a href="lab-tests.html" class="active">Edit Tests</a>
    </nav>
    <div class="header-actions">
      <div class="user-avatar-dropdown">
        <button
          type="button"
          class="avatar-btn"
          id="userAvatarBtn"
          aria-label="Open user menu"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span id="userInitial">L</span>
        </button>
        <div class="user-menu" id="userMenu" role="menu" aria-label="Lab actions">
          <button type="button" class="user-menu-btn" data-action="edit-profile">Edit Profile</button>
          <button type="button" class="user-menu-btn" data-action="logout">Logout</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="main-container">
  <div class="container working-hours-card">
    <h2 id="pageTitle">Edit Tests</h2>
    <p id="pageSubtitle" class="working-hours-note">Add, update, or remove the lab tests patients can book online.</p>

    <h3 class="section-subtitle">Tests Offered</h3>
    <p class="verification-help">Keep test names, prices, and preparation notes accurate so patients know exactly what to expect.</p>
    <div class="tests-editor">
      <div class="tests-editor-header">
        <span>Test Name</span>
        <span>Price (Rs.)</span>
        <span>Notes (Optional)</span>
        <span></span>
      </div>
      <div id="testsList" class="tests-list"></div>
      <button type="button" id="addTestBtn" class="add-test-btn">+ Add Test</button>
    </div>

    <div class="form-actions">
      <button id="saveLabTests" type="button">Save Tests</button>
    </div>
  </div>
</main>

<script type="module" src="lab-tests.js?v=20260327a"></script>
<script type="module" src="site-footer.js?v=20260327b"></script>
</body>
</html>
