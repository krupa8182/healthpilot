<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - HealthPilot</title>
  <link rel="stylesheet" href="doctors.css?v=20260326f">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body data-flow-nav="back" data-flow-target="doctors.html" data-flow-label="Back to Doctors" data-flow-container="body">

  <header class="primary-header patient-header">
    <div class="logo">
      <span>HealthPilot</span>
    </div>
    <div class="header-toolbar">
      <button class="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="patientNavLinks">Menu</button>
      <nav class="primary-nav patient-nav-bar" id="patientNavLinks">
        <a href="patient-dashboard.html#dashboard">Dashboard</a>
        <a href="doctors.html" class="active">Find Doctors</a>
        <a href="labs.html">Find Labs</a>
        <a href="patient-payments.html">Payments</a>
      </nav>
      <div class="header-actions">
        <div class="user-avatar-dropdown" id="userAvatarDropdown">
          <button
            type="button"
            class="avatar-btn"
            id="userAvatarBtn"
            aria-label="Open user menu"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span id="userInitial">P</span>
          </button>
          <div class="user-menu" id="userMenu" role="menu" aria-label="Patient actions">
            <button type="button" class="user-menu-btn" data-action="edit-profile">Edit Profile</button>
            <button type="button" class="user-menu-btn" data-action="logout">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <h2 id="bookingHeading">Book Your Appointment</h2>

  <form id="appointmentForm" class="doctor-card">
    <label for="date">Select Date:</label>
    <input type="date" id="date" required>

    <input type="hidden" id="time">

    <label>Select Time Slot:</label>
    <div id="timeSlots"></div>

    <label for="problem">Problem (optional):</label>
    <textarea id="problem" placeholder="Describe your symptoms"></textarea>

    <div id="feeDisplay" style="display: none;">
      <h3>Consultation Fee: ₹<span id="feeAmount"></span></h3>
    </div>

    <h3 id="paymentMethodTitle" class="section-subtitle">Choose Payment Method</h3>
    <div class="payment-methods">
      <label>
        <input type="radio" name="paymentMethod" value="cash" checked>
        Cash on visit
      </label>
      <label>
        <input type="radio" name="paymentMethod" value="online">
        Online payment (Razorpay)
      </label>
    </div>
    <div class="form-actions">
      <button type="submit">Book Appointment</button>
    </div>
  </form>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script type="module" src="mobile-nav.js?v=20260306a"></script>
<script type="module" src="patient-header.js?v=20260326a"></script>
<script type="module" src="patient-notifications.js?v=20260327b"></script>
<script type="module" src="booking-appointment.js?v=20260327j"></script>
  <script type="module" src="back-button.js"></script>
<script type="module" src="site-footer.js?v=20260327b"></script>
</body>
</html>
