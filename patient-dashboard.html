<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard</title>
<link rel="stylesheet" href="globals.css">
  <link rel="stylesheet" href="doctors.css?v=20260327c">
</head>
<body>

<header class="primary-header patient-header">
  <div class="logo">
    <span>HealthPilot</span>
  </div>
  <div class="header-toolbar">
    <nav class="primary-nav" id="patientNavLinks">
      <a href="#dashboard" id="navDashboard">Dashboard</a>
      <a href="doctors.html" id="navDoctors">Find Doctors</a>
      <a href="labs.html" id="navLabs">Find Labs</a>
      <a href="patient-payments.html" id="navPayments">Payments</a>
    </nav>
    <div class="header-actions">
      <div class="user-avatar-dropdown" id="userAvatarDropdown">
        <button
          type="button"
          class="avatar-btn"
          id="userAvatarBtn"
          aria-label="Open user menu"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span id="userInitial">P</span>
        </button>
        <div class="user-menu" id="userMenu" role="menu" aria-label="User actions">
          <button type="button" class="user-menu-btn" data-action="edit-profile">Edit Profile</button>
          <button type="button" class="user-menu-btn" data-action="logout">Logout</button>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="main-container" id="dashboard">
  <section class="dashboard-hero-card featured-hero" id="dashboardHeroSection">
    <div class="welcome-info">
      <p class="section-kicker">Patient Workspace</p>
      <h3 id="welcomeName"></h3>
      <p id="email"></p>
    </div>
    <div class="dashboard-stats">
      <div class="stat-card">
        <p class="stat-label">Doctors</p>
        <p class="stat-value" id="doctorCount">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Labs</p>
        <p class="stat-value" id="labCount">0</p>
      </div>
    </div>
  </section>

  <!-- ===================== YOUR APPOINTMENTS ===================== -->
  <div class="appointments-section" id="appointments">
    <div class="section-head">
      <h2>Your Appointments</h2>
      <div class="tabs">
        <button class="tab-btn active" data-status="approved">Upcoming</button>
        <button class="tab-btn" data-status="cancelled">Cancelled</button>
      </div>
      <a href="#appointments" class="section-link">Latest</a>
    </div>
    <div id="appointmentsContainer">
      <!-- Filtered appointment cards will appear here -->
    </div>
  </div>

  <!-- ===================== AVAILABLE DOCTORS ===================== -->
  <div class="doctors-section" id="availableDoctorsSection">
    <div class="section-head">
      <h2>Available Doctors</h2>
      <a href="doctors.html" class="section-link">View all</a>
    </div>
    <div class="doctor-grid" id="doctorList">
      <!-- Doctor cards will appear here -->
    </div>
  </div>

</div>

<script type="module" src="mobile-nav.js?v=20260306a"></script>
<script type="module" src="patient-notifications.js?v=20260327b"></script>
<script type="module" src="patient-dashboard.js?v=20260327c"></script>
<script type="module" src="site-footer.js?v=20260327b"></script>
</body>
</html>
