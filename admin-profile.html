<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Admin Profile - HealthPilot</title>
  <link rel="stylesheet" href="doctors.css?v=20260327g">
</head>
<body>

<header class="primary-header">
  <div class="logo">
    <span>HealthPilot</span>
  </div>
  <div class="header-toolbar">
    <nav class="primary-nav" aria-label="Admin navigation">
      <a href="admin-dashboard.html">Dashboard</a>
    </nav>
    <div class="header-actions">
      <div class="user-avatar-dropdown" id="adminAvatarDropdown">
        <button
          type="button"
          class="avatar-btn"
          id="adminAvatarBtn"
          aria-label="Open admin menu"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span id="adminInitial">A</span>
        </button>
        <div class="user-menu" id="adminMenu" role="menu" aria-label="Admin actions">
          <button type="button" class="user-menu-btn" data-action="edit-profile">Edit Profile</button>
          <button type="button" class="user-menu-btn" data-action="logout">Logout</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="main-container">
  <div class="profile-card">
    <h2 class="page-title">Edit Admin Profile</h2>
    <p class="profile-subtitle">Update the admin account details shown on the dashboard.</p>

    <form id="adminProfileForm" class="form">
      <label for="adminNameInput">Full Name</label>
      <input type="text" id="adminNameInput" placeholder="e.g. Priya Singh" required>

      <label for="adminEmailInput">Email Address</label>
      <input type="email" id="adminEmailInput" placeholder="name@example.com" required>

      <label for="adminPhoneInput">Phone Number</label>
      <input type="tel" id="adminPhoneInput" placeholder="+91xxxxxxxxxx">

      <div id="profileStatus" class="verification-help" aria-live="polite"></div>

      <div class="form-actions">
        <button type="submit">Save Changes</button>
      </div>
    </form>
  </div>
</main>

<script type="module" src="admin-profile.js?v=20260327a"></script>
<script type="module" src="site-footer.js?v=20260327b"></script>
</body>
</html>
